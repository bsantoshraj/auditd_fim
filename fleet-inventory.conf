# Fleet inventory for sizing collection
# Format: hostname role [ssh_user] [ssh_port]
#
# Roles: webserver, appserver, database, bastion, cirunner, containerhost
#
# Examples:
# web-prod-01    webserver    ubuntu    22
# db-prod-01     database     ubuntu    22
# bastion-01     bastion      ec2-user  22
# ci-runner-01   cirunner     ubuntu    22
# k8s-node-01    containerhost ubuntu   22
